name: Build Android APK

on:
  workflow_dispatch: # এই অপশনটির কারণে আপনি যখন চাইবেন তখনই বিল্ড করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Packages
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Install & Setup Capacitor
      run: |
        npm install @capacitor/core
        npm install -D @capacitor/cli @capacitor/android
        echo '{ "appId": "com.khamar.app", "appName": "Digital Farm", "webDir": "dist", "bundledWebRuntime": false }' > capacitor.config.json
        npx cap add android
        npx cap sync android

    - name: Setup Java for Android
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build APK file
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: khamar-app-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
