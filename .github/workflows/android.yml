name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Cordova Project and Package Web Files
        run: |
          cd ..
          cordova create build_tmp com.sufian.bhasha SufianBhashaApp
          cd build_tmp
          rm -rf www/*
          
          # আপনার গিটহাবের মেইন ফাইল বা সাব-ফোল্ডারের সব ফাইল খুঁজে www তে কপি করা হচ্ছে
          if [ -d "../Sufian-Sheikh/www" ]; then
            cp -r ../Sufian-Sheikh/www/* www/
          else
            cp -r ../Sufian-Sheikh/* www/
          fi
          
          # যদি ফাইলগুলো আরও ভেতরে থাকে, সেগুলোকে বের করে আনা হচ্ছে
          if [ ! -f "www/index.html" ] && [ -f "www/public/index.html" ]; then
            cp -r www/public/* www/
          fi

          # মেইন ফাইল ফিক্সিং (যাতে সাদা স্ক্রিন না আসে)
          if [ ! -f "www/index.html" ]; then
            cp www/Home.html www/index.html || cp www/home.html www/index.html || cp www/Index.html www/index.html || true
          fi

          cordova platform add android
          cordova build android --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SufianBhashaApp-APK
          path: /home/runner/work/Sufian-Sheikh/build_tmp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
