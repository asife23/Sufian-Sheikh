name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Cordova Project and Package Web Files
        run: |
          cd ..
          cordova create build_tmp com.bangla.english BhashaApp
          cd build_tmp
          rm -rf www/*
          cp -r ../Sufian-Sheikh/* www/
          cordova platform add android
          cordova build android --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BhashaApp-APK
          path: /home/runner/work/Sufian-Sheikh/build_tmp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
