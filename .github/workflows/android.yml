name: Build Android APK

on:
push:
pull_request:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install Dependencies
    run: npm install

  - name: Build Vite Project
    run: npm run build

  - name: Install Cordova
    run: npm install -g cordova

  - name: Setup Java 17
    uses: actions/setup-java@v4
    with:
      distribution: zulu
      java-version: 17

  - name: Setup Android SDK
    uses: android-actions/setup-android@v3

  - name: Create Android App
    run: |
      cd ..

      cordova create farmapp com.sufian.digitalfarm DigitalFarm

      cd farmapp

      rm -rf www/*

      cp -r ../Sufian-Sheikh/dist/* www/

      cordova platform add android

      cordova build android

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: DigitalFarm-APK
      path: /home/runner/farmapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
